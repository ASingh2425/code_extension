<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeSync Settings</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="dark-mode settings-page">
    <div class="settings-container">
      <header class="header">
        <h1>CodeSync Settings</h1>
        <p class="subtitle">Configure your synchronization preferences</p>
      </header>
      
      <main class="settings-form">
        <section class="settings-group">
          <h2>GitHub Integration</h2>
          <div class="form-control">
            <label for="github-proxy">OAuth Proxy URL</label>
            <input type="text" id="github-proxy" placeholder="e.g., https://codesync-oauth.vercel.app" />
            <small>Your deployed Vercel proxy URL.</small>
          </div>
          <div class="form-control">
            <label for="github-client-id">OAuth Client ID</label>
            <input type="text" id="github-client-id" placeholder="e.g., Ov23wp..." />
            <small>Client ID from your GitHub OAuth App.</small>
          </div>
          <div class="form-control">
            <label for="github-token">Personal Access Token (PAT) Fallback</label>
            <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxx" />
            <small>Only needed if not using the OAuth flow above.</small>
          </div>
          <div class="form-control">
            <label for="github-repo">Repository Name</label>
            <input type="text" id="github-repo" placeholder="e.g., ASingh2425/DSA_Practice" />
          </div>
          <button id="btn-auth" class="btn primary">Authenticate with GitHub</button>
        </section>

        <section class="settings-group">
          <h2>Preferences</h2>
          <div class="form-control checkbox">
            <input type="checkbox" id="auto-sync" checked />
            <label for="auto-sync">Enable Auto Sync</label>
          </div>
          <div class="form-control checkbox">
            <input type="checkbox" id="update-readme" checked />
            <label for="update-readme">Automatically Update README.md</label>
          </div>
          <div class="form-control checkbox">
            <input type="checkbox" id="dark-mode-toggle" checked />
            <label for="dark-mode-toggle">Dark Mode</label>
          </div>
        </section>

        <section class="actions">
          <button id="btn-save" class="btn primary">Save Settings</button>
        </section>
      </main>
    </div>
    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
